<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food & Beverages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121212;
            color: white;
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #e50914 0%, #d40812 100%);
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 30px 20px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .subtitle {
            color: #bbb;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .food-card {
            background: #1f1f1f;
            padding: 0;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid #333;
            transition: 0.3s;
            overflow: hidden;
        }

        .food-card:hover {
            border-color: #e50914;
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(229, 9, 20, 0.3);
        }

        .food-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .food-info {
            padding: 15px;
        }

        .food-name {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .food-price {
            color: #00c853;
            font-weight: bold;
            font-size: 18px;
        }

        .summary {
            background: #1f1f1f;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-top: 30px;
        }

        .summary h3 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .total-row {
            padding: 15px 0;
            border-top: 1px solid #555 !important;
            font-weight: bold;
            font-size: 18px;
        }

        .total-row span:last-child {
            color: #e50914;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn {
            background: #666;
            color: white;
        }

        .back-btn:hover {
            background: #777;
        }

        .next-btn {
            background: #e50914;
            color: white;
            flex: 2;
        }

        .next-btn:hover {
            background: #ff1f2d;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .food-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <header>
        🎬 Andaman Movie Tickets - Food & Beverages
    </header>

    <div class="container">
        <h2>🍿 Add Food & Beverages</h2>
        <p class="subtitle">(Optional) Enhance your movie experience</p>

        <div class="food-grid">
            <div class="food-card" onclick="addFood('Popcorn', 100)">
                <img src="https://via.placeholder.com/200x150?text=Popcorn" alt="Popcorn">
                <div class="food-info">
                    <div class="food-name">🍿 Popcorn</div>
                    <div class="food-price">₹100</div>
                </div>
            </div>

            <div class="food-card" onclick="addFood('Coke', 80)">
                <img src="https://via.placeholder.com/200x150?text=Coke" alt="Coke">
                <div class="food-info">
                    <div class="food-name">🥤 Coke</div>
                    <div class="food-price">₹80</div>
                </div>
            </div>

            <div class="food-card" onclick="addFood('Nachos', 120)">
                <img src="https://via.placeholder.com/200x150?text=Nachos" alt="Nachos">
                <div class="food-info">
                    <div class="food-name">🌽 Nachos</div>
                    <div class="food-price">₹120</div>
                </div>
            </div>

            <div class="food-card" onclick="addFood('Candy', 150)">
                <img src="https://via.placeholder.com/200x150?text=Candy" alt="Candy">
                <div class="food-info">
                    <div class="food-name">🍬 Candy</div>
                    <div class="food-price">₹150</div>
                </div>
            </div>

            <div class="food-card" onclick="addFood('Pizza Slice', 180)">
                <img src="https://via.placeholder.com/200x150?text=Pizza" alt="Pizza">
                <div class="food-info">
                    <div class="food-name">🍕 Pizza Slice</div>
                    <div class="food-price">₹180</div>
                </div>
            </div>

            <div class="food-card" onclick="addFood('Hotdog', 140)">
                <img src="https://via.placeholder.com/200x150?text=Hotdog" alt="Hotdog">
                <div class="food-info">
                    <div class="food-name">🌭 Hotdog</div>
                    <div class="food-price">₹140</div>
                </div>
            </div>
        </div>

        <div class="summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
                <strong>Ticket Price:</strong>
                <span>₹<span id="ticketPrice">0</span></span>
            </div>
            <div class="summary-row">
                <strong>Food Total:</strong>
                <span>₹<span id="foodTotal">0</span></span>
            </div>
            <div class="summary-row total-row">
                <span>Grand Total:</span>
                <span>₹<span id="grandTotal">0</span></span>
            </div>

            <div class="button-group">
                <button class="btn back-btn" onclick="window.location.href='seat-selection.html'">
                    ← Back
                </button>
                <button class="btn next-btn" onclick="goToPayment()">
                    Proceed to Payment →
                </button>
            </div>
        </div>
    </div>

    <script>
        let foodTotal = 0;
        const ticketAmount = parseInt(localStorage.getItem("ticketAmount")) || 0;

        document.getElementById("ticketPrice").innerText = ticketAmount;

        function addFood(name, price) {
            foodTotal += price;
            updateTotal();
            showNotification(name + " added to cart!");
        }

        function updateTotal() {
            const grandTotal = ticketAmount + foodTotal;
            document.getElementById("foodTotal").innerText = foodTotal;
            document.getElementById("grandTotal").innerText = grandTotal;
            localStorage.setItem("foodTotal", foodTotal);
        }

        function goToPayment() {
            const grandTotal = ticketAmount + foodTotal;
            localStorage.setItem("totalAmount", grandTotal);
            window.location.href = "payment.html";
        }

        function showNotification(message) {
            const notification = document.createElement("div");
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #00c853;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                z-index: 1000;
            `;
            notification.innerText = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 2000);
        }

        updateTotal();
    </script>

</body>

</html>
