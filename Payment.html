<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:white;
}

.header{
background:#e50914;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:600px;
margin:30px auto;
padding:20px;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

.payment-option{
display:flex;
align-items:center;
padding:15px;
background:#2b2b2b;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
border:2px solid transparent;
}

.payment-option:hover{
border-color:#e50914;
}

.payment-option input{
margin-right:15px;
}

.summary{
font-size:18px;
line-height:2;
}

.pay-btn{
width:100%;
padding:15px;
background:#e50914;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.pay-btn:hover{
background:#ff1f2d;
}

.success{
display:none;
margin-top:20px;
background:#00c853;
padding:15px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
🎬 Andaman Movie Tickets
</div>

<div class="container">

<div class="card">

<h2>Booking Summary</h2>

<div class="summary">
<p>Seats: <span id="seatList"></span></p>
<p>Total Amount: ₹<span id="amount"></span></p>
</div>

</div>

<div class="card">

<h2>Select Payment Method</h2>

<label class="payment-option">
<input type="radio" name="payment" value="UPI" checked>
UPI Payment
</label>

<label class="payment-option">
<input type="radio" name="payment" value="PhonePe">
PhonePe
</label>

<label class="payment-option">
<input type="radio" name="payment" value="Google Pay">
Google Pay
</label>

<label class="payment-option">
<input type="radio" name="payment" value="Paytm">
Paytm
</label>

<label class="payment-option">
<input type="radio" name="payment" value="Credit Card">
Credit / Debit Card
</label>

<label class="payment-option">
<input type="radio" name="payment" value="Net Banking">
Net Banking
</label>

</div>

<button class="pay-btn" onclick="processPayment()">
Pay Now
</button>

<div class="success" id="successBox">
✅ Payment Successful! Redirecting...
</div>

</div>

<script>

const seats =
JSON.parse(localStorage.getItem("selectedSeats")) || [];

const amount =
localStorage.getItem("ticketAmount") || 0;

document.getElementById("seatList").innerText =
seats.join(", ");

document.getElementById("amount").innerText =
amount;

function processPayment(){

const paymentMethod =
document.querySelector(
'input[name="payment"]:checked'
).value;

localStorage.setItem(
"paymentMethod",
paymentMethod
);

document.getElementById(
"successBox"
).style.display="block";

setTimeout(()=>{

window.location.href=
"ticket.html";

},2000);

}

</script>

</body>
</html>
