<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
}

.header{
    background:#e50914;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.container{
    width:90%;
    margin:auto;
    padding:30px 0;
}

.movie-details{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
}

.poster{
    flex:1;
    min-width:300px;
}

.poster img{
    width:100%;
    border-radius:12px;
}

.details{
    flex:2;
}

.movie-title{
    font-size:40px;
    margin-bottom:10px;
}

.rating{
    color:gold;
    margin-bottom:15px;
}

.info{
    margin-bottom:20px;
    line-height:1.8;
}

.description{
    margin-bottom:20px;
    color:#ddd;
    line-height:1.8;
}

.languages,
.formats{
    margin-bottom:20px;
}

.tag{
    display:inline-block;
    padding:8px 15px;
    background:#333;
    border-radius:20px;
    margin:5px;
}

.book-btn{
    background:#e50914;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

.section{
    margin-top:40px;
}

.cast-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.cast-card{
    background:#1f1f1f;
    text-align:center;
    padding:15px;
    border-radius:10px;
}

.cast-card img{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:10px;
}

footer{
    margin-top:50px;
    background:black;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>
