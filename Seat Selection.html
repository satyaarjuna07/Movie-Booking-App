<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
    text-align:center;
}

.header{
    background:#e50914;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.screen{
    width:80%;
    margin:20px auto;
    background:white;
    color:black;
    padding:12px;
    border-radius:50px;
    font-weight:bold;
}

.seat-layout{
    display:grid;
    grid-template-columns:repeat(10, 1fr);
    gap:10px;
    margin-top:30px;
}

.seat{
    width:40px;
    height:40px;
    border-radius:8px;
    background:#444;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.seat:hover{
    background:#666;
}

.selected{
    background:#00c853;
}

.booked{
    background:#d50000;
    cursor:not-allowed;
}

.legend{
    margin-top:20px;
}

.legend span{
    margin:0 15px;
}

.box{
    width:15px;
    height:15px;
    display:inline-block;
    margin-right:5px;
}

.available{
    background:#444;
}

.sel{
    background:#00c853;
}

.bkd{
    background:#d50000;
}

.summary{
    margin-top:30px;
    background:#1f1f1f;
    padding:20px;
    border-radius:10px;
}

.next-btn{
    margin-top:20px;
    padding:12px 30px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.next-btn:hover{
    background:#ff1e2d;
}

@media(max-width:768px){
    .seat-layout{
        grid-template-columns:repeat(5,1fr);
    }

    .seat{
        width:45px;
        height:45px;
    }
}
</style>
</head>

<body>

<div class="header">
🎬 Andaman Movie Tickets
</div>

<div class="container">

<h2>Select Your Seats</h2>

<div class="screen">
SCREEN
</div>

<div class="seat-layout" id="seatLayout"></div>

<div class="legend">
<span><div class="box available"></div>Available</span>
<span><div class="box sel"></div>Selected</span>
<span><div class="box bkd"></div>Booked</span>
</div>

<div class="summary">
<h3>Booking Summary</h3>

<p>Selected Seats:
<span id="selectedSeats">None</span></p>

<p>Total Amount:
₹<span id="totalPrice">0</span></p>

<button class="next-btn"
onclick="goToFoodPage()">
Continue
</button>
</div>

</div>

<script>

const seatLayout = document.getElementById("seatLayout");

const selectedSeatsText =
document.getElementById("selectedSeats");

const totalPriceText =
document.getElementById("totalPrice");

let selectedSeats = [];

const seatPrice = 200;

const bookedSeats =
["A3","A4","B5","C6","D8","E2"];

const rows = ["A","B","C","D","E"];

rows.forEach(row=>{

for(let i=1;i<=10;i++){

const seatNumber = row+i;

const seat = document.createElement("div");

seat.classList.add("seat");

seat.innerText=i;

if(bookedSeats.includes(seatNumber)){
seat.classList.add("booked");
}
else{

seat.addEventListener("click",()=>{

seat.classList.toggle("selected");

if(selectedSeats.includes(seatNumber)){
selectedSeats =
selectedSeats.filter(
s=>s!==seatNumber
);
}
else{
selectedSeats.push(seatNumber);
}

updateSummary();

});

}

seatLayout.appendChild(seat);

}

});

function updateSummary(){

selectedSeatsText.innerText =
selectedSeats.length
? selectedSeats.join(", ")
: "None";

totalPriceText.innerText =
selectedSeats.length * seatPrice;

}

function goToFoodPage(){

if(selectedSeats.length===0){

alert("Please select at least one seat.");

return;

}

localStorage.setItem(
"selectedSeats",
JSON.stringify(selectedSeats)
);

localStorage.setItem(
"ticketAmount",
selectedSeats.length * seatPrice
);

window.location.href =
"food-selection.html";

}

</script>

</body>
</html>
